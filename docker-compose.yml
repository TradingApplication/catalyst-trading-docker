version: '3.8'

services:
  # =============================================================================
  # CATALYST TRADING SYSTEM v2.1.0 - PRODUCTION DEPLOYMENT
  # Budget: ~$40 USD/month (4GB Droplet + Managed DB)
  # =============================================================================

  # -----------------------------------------------------------------------------
  # REVERSE PROXY & SSL TERMINATION
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: catalyst-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - coordination-service
      - web-dashboard
      - news-service
      - scanner-service
      - pattern-service
      - technical-service
      - trading-service
      - reporting-service
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # CORE ORCHESTRATION SERVICE
  # -----------------------------------------------------------------------------
  coordination-service:
    build:
      context: .
      dockerfile: Dockerfile.coordination
    container_name: catalyst-coordination
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - COORDINATION_SERVICE_PORT=5000
      - SERVICE_NAME=coordination_service
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - coordination_logs:/app/logs
      - ./data:/app/data
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # NEWS COLLECTION SERVICE
  # -----------------------------------------------------------------------------
  news-service:
    build:
      context: .
      dockerfile: Dockerfile.news
    container_name: catalyst-news
    ports:
      - "5008:5008"
    env_file:
      - .env
    environment:
      - NEWS_SERVICE_PORT=5008
      - SERVICE_NAME=news_service
    depends_on:
      - redis
      - coordination-service
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - news_logs:/app/logs
      - ./data:/app/data
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # SECURITY SCANNER SERVICE
  # -----------------------------------------------------------------------------
  scanner-service:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: catalyst-scanner
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - SCANNER_SERVICE_PORT=5001
      - SERVICE_NAME=scanner_service
      # Memory optimization flags
      - PYTHONOPTIMIZE=1
      - MALLOC_TRIM_THRESHOLD_=100000
    depends_on:
      - redis
      - news-service
      - coordination-service
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - scanner_logs:/app/logs
      - ./data:/app/data
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # PATTERN ANALYSIS SERVICE (with TA-Lib)
  # -----------------------------------------------------------------------------
  pattern-service:
    build:
      context: .
      dockerfile: Dockerfile.pattern
    container_name: catalyst-patterns
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PATTERN_SERVICE_PORT=5002
      - SERVICE_NAME=pattern_service
      # Memory optimization flags
      - PYTHONOPTIMIZE=1
      - MALLOC_TRIM_THRESHOLD_=100000
    depends_on:
      - redis
      - coordination-service
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - pattern_logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # TECHNICAL ANALYSIS SERVICE (with TA-Lib)
  # -----------------------------------------------------------------------------
  technical-service:
    build:
      context: .
      dockerfile: Dockerfile.technical
    container_name: catalyst-technical
    ports:
      - "5003:5003"
    env_file:
      - .env
    environment:
      - TECHNICAL_SERVICE_PORT=5003
      - SERVICE_NAME=technical_service
      # Memory optimization flags
      - PYTHONOPTIMIZE=1
      - MALLOC_TRIM_THRESHOLD_=100000
    depends_on:
      - redis
      - coordination-service
      - pattern-service
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - technical_logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # PAPER TRADING SERVICE
  # -----------------------------------------------------------------------------
  trading-service:
    build:
      context: .
      dockerfile: Dockerfile.trading
    container_name: catalyst-trading
    ports:
      - "5005:5005"
    env_file:
      - .env
    environment:
      - TRADING_SERVICE_PORT=5005
      - SERVICE_NAME=trading_service
    depends_on:
      - redis
      - coordination-service
      - technical-service
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - trading_logs:/app/logs
      - ./data:/app/data
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # REPORTING SERVICE
  # -----------------------------------------------------------------------------
  reporting-service:
    build:
      context: .
      dockerfile: Dockerfile.reporting
    container_name: catalyst-reporting
    ports:
      - "5009:5009"
    env_file:
      - .env
    environment:
      - REPORTING_SERVICE_PORT=5009
      - SERVICE_NAME=reporting_service
    depends_on:
      - redis
      - coordination-service
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - reporting_logs:/app/logs
      - ./reports:/app/reports
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # WEB DASHBOARD SERVICE
  # -----------------------------------------------------------------------------
  web-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: catalyst-dashboard
    ports:
      - "5010:5010"
    env_file:
      - .env
    environment:
      - DASHBOARD_SERVICE_PORT=5010
      - SERVICE_NAME=dashboard_service
      # Memory optimization for single user
      - MAX_WORKERS=2
    depends_on:
      - coordination-service
      - reporting-service
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - dashboard_logs:/app/logs
    networks:
      - catalyst-network

  # -----------------------------------------------------------------------------
  # SUPPORTING SERVICES
  # -----------------------------------------------------------------------------

  # Redis Cache (Optimized for 4GB droplet)
  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru 
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - catalyst-network

  # Prometheus Monitoring (Lightweight config)
  prometheus:
    image: prom/prometheus:latest
    container_name: catalyst-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=48h'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    networks:
      - catalyst-network

# =============================================================================
# VOLUMES & NETWORKS
# =============================================================================

volumes:
  # Service logs
  coordination_logs:
  news_logs:
  scanner_logs:
  pattern_logs:
  technical_logs:
  trading_logs:
  reporting_logs:
  dashboard_logs:
  nginx_logs:
  
  # Data persistence
  redis_data:
  prometheus_data:

networks:
  catalyst-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# KEY CHANGES FROM PREVIOUS VERSION:
# =============================================================================
# 1. Fixed Dockerfile names (Dockerfile.pattern not .patterns)
# 2. Added env_file: .env to all services for consistent configuration
# 3. Corrected service environment variable names
# 4. Added proper service dependencies
# 5. Added volume mounts for data, models, and reports
# 6. Changed healthcheck from curl to wget (more lightweight)
# 7. Added SSL certificate mount for nginx
# 8. Proper service naming that matches v2.1.0 architecture
# =============================================================================